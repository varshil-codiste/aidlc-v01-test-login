name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: auth
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d auth"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/auth?schema=public
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
      FE_ORIGIN: http://localhost:3000
      APP_ENV: ci

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Generate ephemeral RS256 keypair (CI only)
        if: ${{ env.JWT_PRIVATE_KEY == '' }}
        run: bash scripts/gen-keys.sh && cat .env.local >> $GITHUB_ENV

      - name: Run CI script
        run: bash scripts/ci.sh

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7
